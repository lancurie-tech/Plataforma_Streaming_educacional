# Valida build e lint em PRs e pushes — use como check obrigatório em main/dev (branch protection).
# Deploy para Firebase Hosting: ver .github/workflows/deploy.yml.

name: CI

on:
  pull_request:
    branches: [main, dev]
  push:
    branches: [main, dev]

jobs:
  web:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Instalar dependências
        run: npm ci

      - name: ESLint
        run: npm run lint

      - name: Build (TypeScript + Vite)
        run: npm run build
        env:
          VITE_FIREBASE_API_KEY: ci-build
          VITE_FIREBASE_AUTH_DOMAIN: ci-build
          VITE_FIREBASE_PROJECT_ID: ci-build
          VITE_FIREBASE_STORAGE_BUCKET: ci-build
          VITE_FIREBASE_MESSAGING_SENDER_ID: '0'
          VITE_FIREBASE_APP_ID: ci-build
          VITE_FIREBASE_FUNCTIONS_REGION: southamerica-east1
