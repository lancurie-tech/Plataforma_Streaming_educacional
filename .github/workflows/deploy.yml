# Deploy Firebase apenas em produção (branch **main**).
#
# - Push ou workflow_dispatch na **main** → Hosting live + Firestore, Storage e Cloud Functions.
# - Branch **dev**: sem deploy aqui — usar `.github/workflows/ci.yml` (lint + build com env fictício).
#
# Secrets — produção (projeto `streaming-educacional`):
#   FIREBASE_SERVICE_ACCOUNT, VITE_FIREBASE_API_KEY, VITE_FIREBASE_AUTH_DOMAIN,
#   VITE_FIREBASE_PROJECT_ID, VITE_FIREBASE_STORAGE_BUCKET,
#   VITE_FIREBASE_MESSAGING_SENDER_ID, VITE_FIREBASE_APP_ID
#   Opcional App Check (reCAPTCHA v3 site key): VITE_FIREBASE_APPCHECK_SITE_KEY
#
# Opcional — Settings → Secrets and variables → Actions → Variables:
#   FIREBASE_PROJECT_PROD — ID GCP/Firebase de produção (default: streaming-educacional)

name: Deploy Firebase (produção)

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: read

jobs:
  deploy-prod:
    name: Produção (main)
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    concurrency:
      group: firebase-prod-${{ github.ref }}
      cancel-in-progress: true
    env:
      FIREBASE_GCP_PROJECT: ${{ vars.FIREBASE_PROJECT_PROD || 'streaming-educacional' }}
      VITE_FIREBASE_API_KEY: ${{ secrets.VITE_FIREBASE_API_KEY }}
      VITE_FIREBASE_AUTH_DOMAIN: ${{ secrets.VITE_FIREBASE_AUTH_DOMAIN }}
      VITE_FIREBASE_PROJECT_ID: ${{ secrets.VITE_FIREBASE_PROJECT_ID }}
      VITE_FIREBASE_STORAGE_BUCKET: ${{ secrets.VITE_FIREBASE_STORAGE_BUCKET }}
      VITE_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.VITE_FIREBASE_MESSAGING_SENDER_ID }}
      VITE_FIREBASE_APP_ID: ${{ secrets.VITE_FIREBASE_APP_ID }}
      VITE_FIREBASE_FUNCTIONS_REGION: southamerica-east1
      VITE_FIREBASE_APPCHECK_SITE_KEY: ${{ secrets.VITE_FIREBASE_APPCHECK_SITE_KEY }}
      GEMINI_MODEL: gemini-2.5-flash
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

      - name: Confirmar secrets de build (sem imprimir valores)
        run: |
          ok=1
          for v in VITE_FIREBASE_API_KEY VITE_FIREBASE_AUTH_DOMAIN VITE_FIREBASE_PROJECT_ID VITE_FIREBASE_STORAGE_BUCKET VITE_FIREBASE_MESSAGING_SENDER_ID VITE_FIREBASE_APP_ID; do
            val="${!v}"
            if [ -z "$val" ]; then echo "::error::Variável $v está vazia — verifica os secrets de produção no GitHub."; ok=0; fi
          done
          if [ "$VITE_FIREBASE_PROJECT_ID" != "$FIREBASE_GCP_PROJECT" ]; then
            echo "::warning::O projectId do config Web (VITE_FIREBASE_PROJECT_ID) não coincide com o ID usado no deploy (FIREBASE_GCP_PROJECT). Alinha o secret VITE_FIREBASE_PROJECT_ID ou a variável FIREBASE_PROJECT_PROD."
          fi
          [ "$ok" = 1 ] || exit 1

      - name: Hosting — live (main)
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          channelId: live
          projectId: ${{ vars.FIREBASE_PROJECT_PROD || 'streaming-educacional' }}

      - name: Autenticar Google Cloud (backend prod)
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}

      - name: Dependências Cloud Functions (prod)
        run: npm ci --prefix functions

      - name: Firestore, Storage e Cloud Functions (prod)
        run: |
          printf 'GEMINI_MODEL=%s\n' "${GEMINI_MODEL:-gemini-2.5-flash}" > functions/.env
          npx firebase-tools@latest deploy --only firestore,storage,functions --project "$FIREBASE_GCP_PROJECT" --non-interactive --force
